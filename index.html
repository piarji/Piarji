<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PAT</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .login-box {
            background: black;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
            color: white;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
            transition: box-shadow 0.5s ease;
        }

        .login-box:hover {
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
        }

        .login-box img {
            width: 60%;
            height: auto;
            margin-bottom: 10px;
        }

        .login-content {
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transition: all 1.2s ease-in-out;
        }

        .login-box:hover .login-content {
            opacity: 1;
            max-height: 600px;
            margin-top: 20px;
        }

        #error-message {
            color: #ff4d4d;
            font-size: 0.8em;
            margin-bottom: 15px;
            display: none;
            font-weight: bold;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 20px;
        }

        input[type="text"], 
        input[type="password"] {
            width: 100%;
            padding: 12px 35px 12px 5px;
            background-color: transparent; 
            border: none; 
            border-bottom: 2px solid teal; 
            color: white; 
            box-sizing: border-box; 
            outline: none; 
            transition: all 0.3s ease; 
        }

        input:focus {
            border-bottom-color: #00ffff;
            box-shadow: 0 1px 0 0 #00ffff; 
        }

        input::placeholder {
            color: #666;
        }

        .toggle-password {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: teal;
            display: flex;
            align-items: center;
        }

        .remember-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 0.85em;
            color: #ccc;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .submit-btn { background-color: white; color: black; }
        .cancel-btn { background-color: #333; color: white; }

        .submit-btn:hover, .cancel-btn:hover {
            background-color: teal;
            color: white;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .apply-shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.7) !important;
        }
    </style>
</head>
<body>

<div class="login-box">
    <img src="pats-removebg-preview.png" alt="Logo">
    
    <div class="login-content">
        <div id="error-message">Invalid username or password.</div>
        
        <form id="loginForm" onsubmit="event.preventDefault(); checkLogin();">
            <div class="input-wrapper">
                <input type="text" id="username" placeholder="Username" required>
            </div>

            <div class="input-wrapper">
                <input type="password" id="password" placeholder="Password" required>
                <span class="toggle-password" onclick="togglePassword()" id="toggleIcon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </span>
            </div>
            
            <div class="remember-container">
                <input type="checkbox" id="remember">
                <label for="remember">Remember Me</label>
            </div>
            
            <div class="button-group">
                <button type="submit" class="submit-btn">Submit</button>
                <button type="reset" class="cancel-btn" onclick="resetForm()">Cancel</button>
            </div>
        </form>
    </div>
</div>

<script>
    const correctUsername = "pat";
    const correctPassword = "1234";

    function togglePassword() {
        const passwordInput = document.getElementById("password");
        const toggleIcon = document.getElementById("toggleIcon");
        
        const eyeIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
        const eyeOffIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;

        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            toggleIcon.innerHTML = eyeOffIcon;
        } else {
            passwordInput.type = "password";
            toggleIcon.innerHTML = eyeIcon;
        }
    }
    
    function checkLogin() {
        const enteredUsername = document.getElementById("username").value;
        const enteredPassword = document.getElementById("password").value;
        const errorMsg = document.getElementById("error-message");
        const loginBox = document.querySelector(".login-box");

        if (enteredUsername === correctUsername && enteredPassword === correctPassword) {
            window.location.href = "PAT.html";
        } else {
            errorMsg.style.display = "block";
            
            loginBox.classList.add("apply-shake");
            
            setTimeout(() => {
                loginBox.classList.remove("apply-shake");
            }, 500);
        }
    }
    
    function resetForm() {
        document.getElementById("error-message").style.display = "none";
        document.querySelector(".login-box").classList.remove("apply-shake");
    }
</script>

</body>
</html>
